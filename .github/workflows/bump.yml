name: Version Bumper

on:
  issue_comment:
    types: [created]

jobs:
  bump-version:
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/bump') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Get PR Info
        id: pr-info
        run: |
          echo "PR_URL=${{ github.event.issue.pull_request.url }}" >> $GITHUB_ENV
        shell: bash

      - name: Checkout PR branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.issue.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update Version
        id: update-version
        shell: pwsh
        run: |
          $filePath = "eng/Versions.props"
          if (-Not (Test-Path $filePath)) {
              Write-Output "Versions.props not found, skipping."
              exit 0
          }

          [xml]$xml = Get-Content $filePath
          $versionPrefix = $xml.SelectSingleNode("//VersionPrefix")
          
          if ($versionPrefix) {
              $version = [Version]$versionPrefix.InnerText
              $newVersion = "{0}.{1}.{2}" -f $version.Major, $version.Minor, ($version.Build + 1)
              $versionPrefix.InnerText = $newVersion
              $xml.Save((Resolve-Path $filePath))

              echo "old_version=$($version.ToString())" >> $env:GITHUB_OUTPUT
              echo "new_version=$newVersion" >> $env:GITHUB_OUTPUT
              echo "changed=true" >> $env:GITHUB_OUTPUT
          } else {
              echo "changed=false" >> $env:GITHUB_OUTPUT
          }

      - name: Commit and Push Changes
        if: steps.update-version.outputs.changed == 'true'
        shell: bash
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add eng/Versions.props
          git commit -m "bump: Update patch version from ${{ steps.update-version.outputs.old_version }} to ${{ steps.update-version.outputs.new_version }}

          Triggered by: @${{ github.event.comment.user.login }}
          Timestamp (UTC): $(date -u +"%Y-%m-%d %H:%M:%S")"

          git push
